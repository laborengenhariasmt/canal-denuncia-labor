<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Denúncias | Labor</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="hero">
  <img src="assets/logo-labor.png" alt="Labor Engenharia" class="logo">
  <h1>Painel Interno de Denúncias</h1>
  <p class="subtitulo">Área restrita para acompanhamento das ocorrências registradas.</p>
</header>

<main class="container">

  <section class="card" id="loginCard">
    <h2>Acesso Restrito</h2>

    <label>Usuário</label>
    <input type="text" id="usuario" placeholder="Digite o usuário">

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Digite a senha">

    <button onclick="fazerLogin()">Entrar</button>

    <p id="erroLogin" style="color:red; margin-top:15px;"></p>
  </section>

  <section class="card" id="painelCard" style="display:none;">
    <h2>Denúncias Recebidas</h2>
    <div id="resumoDenuncias" class="dashboard-resumo"></div>
    <label>Filtrar por Status</label>
    <select id="filtroStatus" onchange="aplicarFiltroStatus()">
      <option value="Todos">Todos</option>
      <option value="Recebida">Recebida</option>
      <option value="Em análise">Em análise</option>
      <option value="Em investigação">Em investigação</option>
      <option value="Concluída">Concluída</option>
      <option value="Arquivada">Arquivada</option>
    </select>
    
    <button onclick="carregarDenuncias()">Atualizar Lista</button>
    <button onclick="sair()" style="background:#555;">Sair</button>

    <div id="listaDenuncias" style="margin-top: 25px;"></div>
  </section>

</main>

<div id="modalDetalhes" class="modal">
  <div class="modal-conteudo">
    <button class="modal-fechar" onclick="fecharDetalhes()">Fechar</button>
    <div id="conteudoDetalhes"></div>
  </div>
</div>
  
<script src="js/admin.js"></script>

</body>
</html>
